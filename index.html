<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda San Jorge | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="img/logo.png" alt="Logo San Jorge">
    </div>
    <div class="header-right">
        <a href="login.html" class="nav-link">Mi Cuenta</a>
        <div class="cart-icon" style="cursor: pointer;">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </div>
</header>

<main>
    <section class="banner">
        <h1>Calidad que se siente en cada mordisco</h1>
    </section>

    <div id="productos-grid" class="grid-productos"></div>
</main>

<!-- VENTANA MODAL (Pestaña Emergente) -->
<div id="compraModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <div class="modal-body">
            <div class="modal-product-image">
                <img id="modalImg" src="" alt="Producto">
            </div>
            <div class="modal-info">
                <div class="modal-logo">
                    <img src="img/logo.png" alt="Logo San Jorge">
                </div>
                <h2 id="modalTitle"></h2>
                <div class="modal-buttons">
                    <button class="btn-confirmar" onclick="confirmarCompra()">Comprar</button>
                    <button class="btn-cancelar" onclick="cerrarModal()">Cancelar compra</button>
                </div>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/51950568842" class="btn-whatsapp" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script src="script.js"></script>
</body>
</html>
